proxy_cache_path /var/cache/nginx-frontend levels=1:2 keys_zone=FRONTEND:10m inactive=7d use_temp_path=off;

upstream nextjs_frontend_upstream {
  server 127.0.0.1:5656;
}

server {
  server_name choparpizza.uz;
  server_tokens off;

  root /home/davr/chopar/next_frontend/public;

  # ─── Gzip ─────────────────────────────────────────────────────────────────
  gzip on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # ─── Proxy defaults ──────────────────────────────────────────────────────
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection 'upgrade';
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_cache_bypass $http_upgrade;

  # ─── Next.js build assets (hashed filenames = immutable) ─────────────────
  location /_next/static {
    proxy_cache FRONTEND;
    proxy_cache_valid 200 365d;
    proxy_pass http://nextjs_frontend_upstream;
    proxy_set_header x-middleware-subrequest "";
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Cache-Status $upstream_cache_status;
  }

  # ─── Public static files ────────────────────────────────────────────────
  location /static {
    proxy_cache FRONTEND;
    proxy_ignore_headers Cache-Control;
    proxy_cache_valid 200 60m;
    proxy_pass http://nextjs_frontend_upstream;
    proxy_set_header x-middleware-subrequest "";
    add_header X-Cache-Status $upstream_cache_status;
  }

  # ─── PostHog / analytics proxy ──────────────────────────────────────────
  location ^~ /s/ {
    proxy_pass http://127.0.0.1:9901;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─── All other requests → Next.js ──────────────────────────────────────
  location / {
    proxy_pass http://nextjs_frontend_upstream;
    proxy_set_header x-middleware-subrequest "";
  }

  # ─── Static file caching by extension ───────────────────────────────────
  location ~* \.(ogg|ogv|svg|svgz|eot|otf|woff|woff2|mp4|ttf|rss|atom|jpg|jpeg|gif|png|ico|zip|tgz|gz|rar|bz2|doc|xls|exe|ppt|tar|mid|midi|wav|bmp|rtf|swf|webp|avif)$ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public, max-age=2629746";
  }

  listen 443 ssl; # managed by Certbot
  ssl_certificate /etc/letsencrypt/live/choparpizza.uz/fullchain.pem; # managed by Certbot
  ssl_certificate_key /etc/letsencrypt/live/choparpizza.uz/privkey.pem; # managed by Certbot
  include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
  if ($host = choparpizza.uz) {
    return 301 https://$host$request_uri;
  } # managed by Certbot

  server_name choparpizza.uz;
  listen 80;
  return 404; # managed by Certbot
}
